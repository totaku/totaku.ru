<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пермяк на Неве — прототип v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0f14;
      --bg-card:      #13161e;
      --bg-hover:     #181c27;
      --border:       rgba(255,255,255,0.07);
      --border-mid:   rgba(255,255,255,0.12);
      --text:         #e8eaf0;
      --text-muted:   #6b7485;
      --text-dim:     #9aa0b0;
      --accent:       #5b8dee;
      --tag-bg:       rgba(91,141,238,0.1);
      --tag-color:    #7ba5f0;
      --shadow-hover: 0 8px 40px rgba(0,0,0,0.6);
      --radius:       10px;
    }

    [data-theme="light"] {
      --bg:           #f5f5f0;
      --bg-card:      #ffffff;
      --bg-hover:     #fafaf8;
      --border:       rgba(0,0,0,0.08);
      --border-mid:   rgba(0,0,0,0.15);
      --text:         #1a1c22;
      --text-muted:   #8a8f9e;
      --text-dim:     #555a6a;
      --accent:       #3a6fd8;
      --tag-bg:       rgba(58,111,216,0.08);
      --tag-color:    #3a6fd8;
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.14);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── HEADER ──────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .logo {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo em { font-style: normal; color: var(--accent); }
    .nav {
      display: flex;
      gap: 0.125rem;
      flex: 1;
    }
    .nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8125rem;
      font-weight: 500;
      padding: 0.3rem 0.625rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .nav a:hover { color: var(--text); background: var(--border); }
    .btn-icon {
      width: 32px; height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .btn-icon:hover { color: var(--text); background: var(--bg-hover); border-color: var(--border-mid); }
    .icon-sun  { display: block; }
    .icon-moon { display: none; }
    [data-theme="light"] .icon-sun  { display: none; }
    [data-theme="light"] .icon-moon { display: block; }

    /* ── HERO 9C ─────────────────────────────────────────── */
    .hero {
      max-width: 1140px;
      margin: 0 auto;
      padding: 2.75rem 1.5rem 2.25rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .hero-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d5fa0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.75rem;
      font-weight: 800;
      color: #a8c4e0;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(91,141,238,0.25), 0 12px 40px rgba(0,0,0,0.5);
    }

    .hero-body { flex: 1; min-width: 0; }

    .hero-pre {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
      margin-bottom: 0.4rem;
    }

    .hero-name {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }
    .hero-name em { font-style: normal; color: var(--accent); }

    .hero-bio {
      font-size: 0.875rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
      line-height: 1.6;
      font-family: 'Source Serif 4', serif;
      max-width: 460px;
    }

    .hero-links {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.875rem;
      flex-wrap: wrap;
    }
    .hero-link {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .hero-link:hover { color: var(--accent); }
    .hero-sep { color: var(--border-mid); font-size: 0.875rem; }
    .hero-quote {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'Source Serif 4', serif;
      font-style: italic;
      margin-top: 0.3rem;
      opacity: 0.7;
    }

    /* ── GRID ────────────────────────────────────────────── */
    .container {
      max-width: 1140px;
      margin: 0 auto;
      padding: 1.75rem 1.5rem 4rem;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.25rem;
    }
    @media (max-width: 640px)  { .posts-grid { grid-template-columns: 1fr; } }
    @media (min-width: 1024px) { .posts-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── CARD ────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      animation: cardIn 0.4s ease both;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(91,141,238,0.2);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-cover {
      aspect-ratio: 16/9;
      overflow: hidden;
    }
    .card-cover-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: filter 0.3s;
    }
    .card:hover .card-cover-placeholder { filter: brightness(1.15); }

    .placeholder-dev    { background: linear-gradient(135deg, #0f2744, #1a3f6f); color: #5b8dee; }
    .placeholder-games  { background: linear-gradient(135deg, #1a0f2e, #2d1a52); color: #9b7fe8; }
    .placeholder-screen { background: linear-gradient(135deg, #1a1200, #3d2d00); color: #d4a017; }
    .placeholder-place  { background: linear-gradient(135deg, #0a2010, #1a4020); color: #4caf72; }
    .placeholder-tldr   { background: linear-gradient(135deg, #1a0a0a, #3d1515); color: #e05555; }
    .placeholder-other  { background: linear-gradient(135deg, #111318, #1e2230); color: #6b7485; }

    .card-body {
      padding: 1rem 1.125rem 1.125rem;
      display: flex; flex-direction: column; flex: 1; gap: 0.5rem;
    }
    .card-title {
      font-size: 0.9375rem; font-weight: 700;
      color: var(--text); line-height: 1.4; letter-spacing: -0.01em;
    }
    .card-desc {
      font-size: 0.8125rem; color: var(--text-dim); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; flex: 1;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 0.25rem; padding-top: 0.625rem; border-top: 1px solid var(--border);
    }
    .card-date { font-size: 0.75rem; color: var(--text-muted); }
    .card-cat {
      font-size: 0.6875rem; font-weight: 600;
      color: var(--tag-color); background: var(--tag-bg);
      padding: 0.2em 0.6em; border-radius: 4px;
      text-decoration: none; letter-spacing: 0.02em;
    }

    /* ── LOADER ──────────────────────────────────────────── */
    .sentinel {
      height: 40px; display: flex; align-items: center; justify-content: center;
      margin: 1rem 0 2rem;
    }
    .loader { display: flex; gap: 6px; opacity: 0; transition: opacity 0.3s; }
    .loader.visible { opacity: 1; }
    .loader span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.2s; }
    .loader span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    .end-marker {
      text-align: center; color: var(--text-muted);
      font-size: 0.8125rem; padding: 2rem 0 3rem; display: none;
    }
    .end-marker.visible { display: block; }
    .end-marker::before {
      content: '· · ·'; display: block;
      font-size: 1.25rem; letter-spacing: 0.4em;
      margin-bottom: 0.75rem; color: var(--border);
    }
  </style>
</head>

<script>
  const POSTS = [
    { title: 'Установка Docker и Docker-compose на Ubuntu 24.04', desc: 'В этом посте я расскажу как быстро и просто установить Docker и Docker-compose на Ubuntu 24.04. Минимум телодвижений — максимум результата.', date: '30.04.2024', cat: 'dev' },

  const PAGE_SIZE = 6;
  let page = 0, loading = false;
  const grid = document.getElementById('grid');
  const loader = document.getElementById('loader');
  const endMarker = document.getElementById('end-marker');

  const placeholderClass = { dev:'placeholder-dev', games:'placeholder-games', screen:'placeholder-screen', place:'placeholder-place', tldr:'placeholder-tldr' };
  const catLabel = { dev:'Рукоблудие', games:'Игры', screen:'Голубой экран', place:'Места', tldr:'TL;DR' };

  function renderBatch() {
    const start = page * PAGE_SIZE;
    const end = Math.min(start + PAGE_SIZE, POSTS.length);
    if (start >= POSTS.length) return false;
    const frag = document.createDocumentFragment();
    for (let i = start; i < end; i++) {
      const p = POSTS[i];
      const card = document.createElement('a');
      card.className = 'card';
      card.href = '#';
      card.style.animationDelay = `${(i - start) * 0.06}s`;
      const cls = placeholderClass[p.cat] || 'placeholder-other';
      const lbl = catLabel[p.cat] || p.cat;
      card.innerHTML = `
        <div class="card-cover"><div class="card-cover-placeholder ${cls}">${lbl}</div></div>
        <div class="card-body">
          <div class="card-title">${p.title}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-footer">
            <span class="card-date">${p.date}</span>
            <span class="card-cat">${lbl}</span>
          </div>
        </div>`;
      frag.appendChild(card);
    }
    grid.appendChild(frag);
    page++;
    return end < POSTS.length;
  }

  async function loadMore() {
    if (loading) return;
    loading = true;
    loader.classList.add('visible');
    await new Promise(r => setTimeout(r, 500));
    const hasMore = renderBatch();
    loader.classList.remove('visible');
    if (!hasMore) { endMarker.classList.add('visible'); observer.disconnect(); }
    loading = false;
  }

  renderBatch();

  const observer = new IntersectionObserver(
    e => { if (e[0].isIntersecting) loadMore(); },
    { rootMargin: '200px' }
  );
  observer.observe(document.querySelector('.sentinel'));

  document.getElementById('theme-btn').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  });
</script>
</body>
</html>
